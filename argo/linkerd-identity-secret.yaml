# Pre-requisite: This secret must be created on each cluster BEFORE deploying
# the Linkerd control plane. Generate certificates with:
#
#   step certificate create root.linkerd.cluster.local ca.crt ca.key \
#     --profile root-ca --no-password --insecure --force
#
#   step certificate create identity.linkerd.cluster.local issuer.crt issuer.key \
#     --ca ca.crt --ca-key ca.key \
#     --profile intermediate-ca --not-after 8760h --no-password --insecure --force
#
# Then create the secret on each cluster:
#
#   for ctx in k3d-tetris-ap-east k3d-tetris-ap-central k3d-tetris-ap-south; do
#     kubectl --context="$ctx" create namespace linkerd --dry-run=client -o yaml | kubectl --context="$ctx" apply -f -
#     kubectl --context="$ctx" -n linkerd create secret tls linkerd-identity-issuer \
#       --cert=issuer.crt --key=issuer.key
#     kubectl --context="$ctx" -n linkerd create configmap linkerd-identity-trust-roots \
#       --from-file=ca-bundle.crt=ca.crt
#   done
#
# Alternatively, use cert-manager or sealed-secrets to manage these in GitOps.
---
apiVersion: v1
kind: Secret
metadata:
  name: linkerd-identity-issuer
  namespace: linkerd
type: kubernetes.io/tls
data:
  # Base64-encoded issuer certificate
  tls.crt: REPLACE_WITH_BASE64_ISSUER_CRT
  # Base64-encoded issuer key
  tls.key: REPLACE_WITH_BASE64_ISSUER_KEY
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: linkerd-identity-trust-roots
  namespace: linkerd
data:
  # PEM-encoded trust anchor (root CA certificate)
  ca-bundle.crt: |
    REPLACE_WITH_CA_CRT_PEM
