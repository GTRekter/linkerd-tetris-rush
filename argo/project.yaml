apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: tetris
  namespace: argocd
spec:
  description: Tetris Rush — Linkerd multicluster demo
  sourceRepos:
    - "https://github.com/kubernetes-sigs/gateway-api"
    - "https://helm.linkerd.io/edge"
    - "https://helm.linkerd.io/stable"
    # Update this to your actual repo URL
    - "https://github.com/YOUR_ORG/linkerd-tetris-rush.git"
  destinations:
    # gameplay clusters
    - server: "https://gameplay-east:6443"
      namespace: "*"
    - server: "https://gameplay-west:6443"
      namespace: "*"
    - server: "https://gameplay-central:6443"
      namespace: "*"
    # scoring cluster
    - server: "https://scoring:6443"
      namespace: "*"
    # platform cluster
    - server: "https://platform:6443"
      namespace: "*"
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
