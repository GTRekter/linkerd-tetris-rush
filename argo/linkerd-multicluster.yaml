kind: Application
metadata:
  name: linkerd-multicluster-vastaya-ap-south
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: vastaya
  source:
    repoURL: https://helm.buoyant.cloud
    chart: linkerd-enterprise-multicluster
    targetRevision: "*"
    helm:
      valuesObject:
        gateway:
          enabled: true
        controllers:
          - link:
              ref:
                name: vastaya-ap-east
          - link:
              ref:
                name: vastaya-ap-central
  destination:
    server: "https://vastaya-ap-south:6443"
    namespace: linkerd-multicluster
  syncPolicy:
    automated:
      prune: true
