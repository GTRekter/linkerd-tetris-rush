# Linkerd multicluster extension — each cluster gets a gateway and
# service-mirror controllers pointing to every other cluster.
#
# The k3d.sh script also runs `linkerd multicluster link-gen` to create
# Link resources and RBAC for cross-cluster discovery. Those Link resources
# are generated per-environment and should be applied separately (see
# linkerd-multicluster-link.yaml) or managed via an external secret tool.
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: linkerd-multicluster-gameplay-east
  namespace: argocd
  labels:
    component: linkerd-multicluster
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: tetris
  source:
    repoURL: https://helm.buoyant.cloud
    chart: linkerd-enterprise-multicluster
    targetRevision: "*"
    helm:
      valuesObject:
        createNamespaceMetadataJob: false
        gateway:
          enabled: true
        controllers:
          - link:
              ref:
                name: gameplay-west
          - link:
              ref:
                name: gameplay-central
          - link:
              ref:
                name: scoring
          - link:
              ref:
                name: platform
  destination:
    server: "https://gameplay-east:6443"
    namespace: linkerd-multicluster
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
