apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: linkerd-control-plane
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - cluster: tetris-ap-east
            server: "https://tetris-ap-east:6443"
          - cluster: tetris-ap-central
            server: "https://tetris-ap-central:6443"
          - cluster: tetris-ap-south
            server: "https://tetris-ap-south:6443"
  template:
    metadata:
      name: "linkerd-control-plane-{{ .cluster }}"
      annotations:
        argocd.argoproj.io/sync-wave: "2"
    spec:
      project: tetris
      source:
        repoURL: https://helm.buoyant.cloud
        chart: linkerd-enterprise-control-plane
        targetRevision: "*"
        helm:
          valuesObject:
            identity:
              externalCA: true
              issuer:
                scheme: kubernetes.io/tls
            identityTrustAnchorsPEM: ""
      destination:
        server: "{{ .server }}"
        namespace: linkerd
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
      ignoreDifferences:
        - group: ""
          kind: Secret
          name: linkerd-identity-issuer
          jsonPointers:
            - /data
        - group: ""
          kind: ConfigMap
          name: linkerd-identity-trust-roots
          jsonPointers:
            - /data
