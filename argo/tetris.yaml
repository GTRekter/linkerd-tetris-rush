# Tetris Rush application — one Application per cluster with cluster-specific
# values matching the Helm overrides from k3d.sh.
#
# Architecture:
#   gameplay-east/west/central — game + game-api + agent (3 clusters for P2C)
#   scoring                    — leaderboard-api + redis
#   platform                   — dashboard + agent
#
# Update repoURL and targetRevision to match your Git repository.
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tetris-gameplay-east
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: tetris
  source:
    repoURL: "https://github.com/GTRekter/linkerd-tetris-rush.git"
    targetRevision: main
    path: helm/tetris
    helm:
      valuesObject:
        game:
          enabled: true
        gameApi:
          enabled: true
        agent:
          enabled: true
        dashboard:
          enabled: false
        leaderboardApi:
          enabled: false
        leaderboardApiUrl: "http://leaderboard-api-scoring.tetris.svc.cluster.local"
        redis:
          deploy: false
          url: "redis://redis-scoring.tetris.svc.cluster.local:6379"
        cluster:
          name: gameplay-east
          region: gameplay-east
          color: "#3b82f6"
        externalUrl: "http://gameplay-east.localhost:8080"
  destination:
    server: "https://gameplay-east:6443"
    namespace: tetris
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
