# Multicluster Link resources — these wire up cross-cluster service discovery.
#
# In the k3d.sh script these are generated dynamically by:
#   linkerd multicluster link-gen --cluster-name <src> \
#     --gateway-addresses <gw-ip> --gateway-port <gw-port> \
#     --api-server-address <api-ip>:6443
#
# Each Link creates:
#   - A ServiceAccount + RBAC for the service-mirror controller
#   - A kubeconfig Secret so the mirror can reach the remote API server
#   - A Link CR that configures the mirror controller
#
# Because gateway IPs and API server addresses are environment-specific,
# these CANNOT be statically committed to Git. Generate them after cluster
# creation and apply them, or use a post-sync hook / Job.
#
# Example generation for k3d (run after clusters and multicluster are up):
#
