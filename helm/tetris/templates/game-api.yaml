# game-api — FastAPI backend, scalable to 0 for failover demo.
# Its service carries the multicluster label so Linkerd routes cross-cluster.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: game-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tetris.labels" . | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: game-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tetris.labels" . | nindent 4 }}
    app.kubernetes.io/component: game-api
spec:
  replicas: {{ .Values.gameApi.replicaCount }}
  selector:
    matchLabels:
      {{- include "tetris.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: game-api
  template:
    metadata:
      labels:
        {{- include "tetris.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: game-api
      {{- if .Values.linkerd.injectPods }}
      annotations:
        linkerd.io/inject: enabled
      {{- end }}
    spec:
      serviceAccountName: game-api
      containers:
        - name: game-api
          image: "{{ .Values.gameApi.image.repository }}:{{ .Values.gameApi.image.tag }}"
          imagePullPolicy: {{ .Values.gameApi.image.pullPolicy }}
          ports:
            - containerPort: 80
          env:
            - name: CLUSTER_NAME
              value: {{ .Values.cluster.name | quote }}
            - name: CLUSTER_COLOR
              value: {{ .Values.cluster.color | quote }}
            - name: CLUSTER_REGION
              value: {{ .Values.cluster.region | quote }}
            - name: EXTERNAL_URL
              value: {{ .Values.externalUrl | quote }}
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tetris-secrets
                  key: admin-token
            - name: REDIS_URL
              value: {{ include "tetris.redisUrl" . | quote }}
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
          readinessProbe:
            httpGet:
              path: /api/health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: game-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tetris.labels" . | nindent 4 }}
    app.kubernetes.io/component: game-api
    {{- if eq .Values.service.mode "federated" }}
    mirror.linkerd.io/federated: member
    {{- else if eq .Values.service.mode "mirrored" }}
    mirror.linkerd.io/exported: remote-discovery
    {{- else if eq .Values.service.mode "gateway" }}
    mirror.linkerd.io/exported: "true"
    {{- end }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    {{- include "tetris.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: game-api
