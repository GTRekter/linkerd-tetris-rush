apiVersion: v1
kind: ServiceAccount
metadata:
  name: tetris-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tetris.labels" . | nindent 4 }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tetris-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tetris.labels" . | nindent 4 }}
{{- if .Values.dashboard.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dashboard-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tetris.labels" . | nindent 4 }}
{{- end }}
---
# dashboard-api service account and RBAC — on every cluster for k8s scaling
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dashboard-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tetris.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tetris-api-scale
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tetris.labels" . | nindent 4 }}
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    resourceNames: ["tetris-api"]
    verbs: ["get", "patch"]
  # Multicluster mode switching: patch tetris-api Service labels
  - apiGroups: [""]
    resources: ["services"]
    resourceNames: ["tetris-api"]
    verbs: ["get", "patch"]
  # Multicluster mode switching: manage the tetris-api HTTPRoute
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes"]
    resourceNames: ["{{ include "tetris.name" . }}-api"]
    verbs: ["get", "patch", "update"]
  # Authorization policy: manage Server and AuthorizationPolicy resources
  - apiGroups: ["policy.linkerd.io"]
    resources: ["servers", "authorizationpolicies"]
    verbs: ["get", "create", "patch", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tetris-api-scale
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tetris.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tetris-api-scale
subjects:
  - kind: ServiceAccount
    name: dashboard-api
    namespace: {{ .Release.Namespace }}
