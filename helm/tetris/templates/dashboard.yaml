# dashboard — presenter UI, only deployed on the dashboard cluster.
{{- if .Values.dashboard.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tetris.labels" . | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tetris.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  replicas: {{ .Values.dashboard.replicaCount }}
  selector:
    matchLabels:
      {{- include "tetris.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: dashboard
  template:
    metadata:
      labels:
        {{- include "tetris.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: dashboard
      {{- if .Values.linkerd.injectPods }}
      annotations:
        linkerd.io/inject: enabled
      {{- end }}
    spec:
      serviceAccountName: dashboard
      containers:
        - name: dashboard
          image: "{{ .Values.dashboard.image.repository }}:{{ .Values.dashboard.image.tag }}"
          imagePullPolicy: {{ .Values.dashboard.image.pullPolicy }}
          ports:
            - containerPort: 80
          env:
            - name: AGENT_TARGET
              value: "http://agent.{{ .Release.Namespace }}.svc.cluster.local"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tetris.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  type: LoadBalancer
  ports:
    - port: 8090
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    {{- include "tetris.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
{{- end }}
