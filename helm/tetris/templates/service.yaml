# tetris-frontend — player-facing, always up (LoadBalancer for k3d port mapping)
apiVersion: v1
kind: Service
metadata:
  name: tetris-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tetris.labels" . | nindent 4 }}
    app.kubernetes.io/component: tetris-frontend
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    {{- include "tetris.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: tetris-frontend
---
# tetris-api — federated across clusters via Linkerd service mirroring.
# When tetris-api is scaled to 0 on a cluster, Linkerd routes to peers.
apiVersion: v1
kind: Service
metadata:
  name: tetris-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tetris.labels" . | nindent 4 }}
    app.kubernetes.io/component: tetris-api
    {{- if eq .Values.service.mode "federated" }}
    mirror.linkerd.io/federated: member
    {{- else if eq .Values.service.mode "mirrored" }}
    mirror.linkerd.io/exported: remote-discovery
    {{- else if eq .Values.service.mode "gateway" }}
    mirror.linkerd.io/exported: "true"
    {{- end }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    {{- include "tetris.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: tetris-api
{{- if .Values.dashboard.enabled }}
---
# dashboard-frontend — presenter-facing LoadBalancer on port 8090
apiVersion: v1
kind: Service
metadata:
  name: dashboard-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tetris.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard-frontend
spec:
  type: LoadBalancer
  ports:
    - port: 8090
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    {{- include "tetris.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard-frontend
{{- end }}
---
# dashboard-api — deployed on every cluster for k8s scaling.
# Exported via Linkerd so the dashboard cluster can reach remote instances.
apiVersion: v1
kind: Service
metadata:
  name: dashboard-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tetris.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard-api
    mirror.linkerd.io/exported: "true"
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    {{- include "tetris.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard-api
