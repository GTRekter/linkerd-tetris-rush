# game — player-facing Express proxy that serves the game UI
# and proxies /api/* to game-api through the mesh.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: game
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tetris.labels" . | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: game
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tetris.labels" . | nindent 4 }}
    app.kubernetes.io/component: game
spec:
  replicas: {{ .Values.game.replicaCount }}
  selector:
    matchLabels:
      {{- include "tetris.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: game
  template:
    metadata:
      labels:
        {{- include "tetris.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: game
      {{- if .Values.linkerd.injectPods }}
      annotations:
        linkerd.io/inject: enabled
      {{- end }}
    spec:
      serviceAccountName: game
      containers:
        - name: game
          image: "{{ .Values.game.image.repository }}:{{ .Values.game.image.tag }}"
          imagePullPolicy: {{ .Values.game.image.pullPolicy }}
          ports:
            - containerPort: 80
          env:
            - name: API_TARGET
              value: "http://game-api.{{ .Release.Namespace }}.svc.cluster.local"
            - name: API_TARGET_FEDERATED
              value: "http://game-api-federated.{{ .Release.Namespace }}.svc.cluster.local"
            - name: DASHBOARD_API_URL
              value: "http://dashboard-api.{{ .Release.Namespace }}.svc.cluster.local"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: game
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tetris.labels" . | nindent 4 }}
    app.kubernetes.io/component: game
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    {{- include "tetris.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: game
