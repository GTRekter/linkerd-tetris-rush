# leaderboard-api — scoring microservice that owns player/score data.
# Deployed on the scoring cluster and exported via Linkerd multicluster.
{{- if .Values.leaderboardApi.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: leaderboard-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tetris.labels" . | nindent 4 }}
    app.kubernetes.io/component: leaderboard-api
spec:
  replicas: {{ .Values.leaderboardApi.replicaCount }}
  selector:
    matchLabels:
      {{- include "tetris.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: leaderboard-api
  template:
    metadata:
      labels:
        {{- include "tetris.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: leaderboard-api
      {{- if .Values.linkerd.injectPods }}
      annotations:
        linkerd.io/inject: enabled
      {{- end }}
    spec:
      containers:
        - name: leaderboard-api
          image: "{{ .Values.leaderboardApi.image.repository }}:{{ .Values.leaderboardApi.image.tag }}"
          imagePullPolicy: {{ .Values.leaderboardApi.image.pullPolicy }}
          ports:
            - containerPort: 80
          env:
            - name: REDIS_URL
              value: {{ include "tetris.redisUrl" . | quote }}
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tetris-secrets
                  key: admin-token
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: leaderboard-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tetris.labels" . | nindent 4 }}
    app.kubernetes.io/component: leaderboard-api
    mirror.linkerd.io/exported: "true"
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    {{- include "tetris.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: leaderboard-api
{{- end }}
