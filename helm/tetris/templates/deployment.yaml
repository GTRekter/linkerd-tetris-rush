# tetris-frontend — always-on Express proxy that serves the game UI
# and proxies /api/* to tetris-api (federated) through the mesh.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tetris-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tetris.labels" . | nindent 4 }}
    app.kubernetes.io/component: tetris-frontend
spec:
  replicas: {{ .Values.tetrisFrontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "tetris.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: tetris-frontend
  template:
    metadata:
      labels:
        {{- include "tetris.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: tetris-frontend
      {{- if .Values.linkerd.injectPods }}
      annotations:
        linkerd.io/inject: enabled
      {{- end }}
    spec:
      serviceAccountName: tetris-frontend
      containers:
        - name: tetris-frontend
          image: "{{ .Values.tetrisFrontend.image.repository }}:{{ .Values.tetrisFrontend.image.tag }}"
          imagePullPolicy: {{ .Values.tetrisFrontend.image.pullPolicy }}
          ports:
            - containerPort: 80
          env:
            - name: API_TARGET
              value: "http://tetris-api.{{ .Release.Namespace }}.svc.cluster.local"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
---
# tetris-api — FastAPI backend, scalable to 0 for failover demo.
# Its service carries the federated label so Linkerd routes cross-cluster.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tetris-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tetris.labels" . | nindent 4 }}
    app.kubernetes.io/component: tetris-api
spec:
  replicas: {{ .Values.tetrisApi.replicaCount }}
  selector:
    matchLabels:
      {{- include "tetris.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: tetris-api
  template:
    metadata:
      labels:
        {{- include "tetris.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: tetris-api
      {{- if .Values.linkerd.injectPods }}
      annotations:
        linkerd.io/inject: enabled
      {{- end }}
    spec:
      serviceAccountName: tetris-api
      containers:
        - name: tetris-api
          image: "{{ .Values.tetrisApi.image.repository }}:{{ .Values.tetrisApi.image.tag }}"
          imagePullPolicy: {{ .Values.tetrisApi.image.pullPolicy }}
          ports:
            - containerPort: 80
          env:
            - name: CLUSTER_NAME
              value: {{ .Values.cluster.name | quote }}
            - name: CLUSTER_COLOR
              value: {{ .Values.cluster.color | quote }}
            - name: CLUSTER_REGION
              value: {{ .Values.cluster.region | quote }}
            - name: EXTERNAL_URL
              value: {{ .Values.externalUrl | quote }}
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tetris-secrets
                  key: admin-token
            - name: REDIS_URL
              value: {{ include "tetris.redisUrl" . | quote }}
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
          readinessProbe:
            httpGet:
              path: /api/health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
{{- if .Values.dashboard.enabled }}
