              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
{{- end }}
---
# dashboard-api — deployed on every cluster for k8s scaling.
# On the dashboard cluster it also serves cluster info, leaderboard, etc.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tetris.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard-api
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "tetris.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: dashboard-api
  template:
    metadata:
      labels:
        {{- include "tetris.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: dashboard-api
      {{- if .Values.linkerd.injectPods }}
      annotations:
        linkerd.io/inject: enabled
      {{- end }}
    spec:
      serviceAccountName: dashboard-api
      containers:
        - name: dashboard-api
          image: "{{ .Values.dashboardApi.image.repository }}:{{ .Values.dashboardApi.image.tag }}"
          imagePullPolicy: {{ .Values.dashboardApi.image.pullPolicy }}
          ports:
            - containerPort: 80
          env:
            - name: REDIS_URL
              value: {{ include "tetris.redisUrl" . | quote }}
            - name: CLUSTER_NAME
              value: {{ .Values.cluster.name | quote }}
            - name: DEPLOYMENT_NAME
              value: tetris-api
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tetris-secrets
                  key: admin-token
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SERVICE_PORT
              value: {{ .Values.service.port | quote }}
            - name: HTTPROUTE_NAME
              value: "{{ include "tetris.name" . }}-api"
            - name: MULTICLUSTER_BACKENDS
              value: {{ join "," .Values.multicluster.backends | quote }}
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
