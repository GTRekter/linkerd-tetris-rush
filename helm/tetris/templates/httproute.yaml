apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "tetris.name" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tetris.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: tetris-api
      kind: Service
      group: ""
      port: {{ .Values.service.port }}
  rules:
    - backendRefs:
        {{- if eq .Values.service.mode "federated" }}
        # Federated: route through the virtual federated service
        - name: tetris-api-federated
          port: {{ .Values.service.port }}
          weight: 1
        {{- else }}
        # Mirrored / Gateway: split equally across local + mirrored backends
        - name: tetris-api
          port: {{ .Values.service.port }}
          weight: 1
        {{- range .Values.multicluster.backends }}
        - name: {{ . }}
          port: {{ $.Values.service.port }}
          weight: 1
        {{- end }}
        {{- end }}
