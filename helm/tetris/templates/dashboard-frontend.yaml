# dashboard-frontend — presenter UI, only deployed on the dashboard cluster.
{{- if .Values.dashboard.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dashboard-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tetris.labels" . | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tetris.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard-frontend
spec:
  replicas: {{ .Values.dashboardFrontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "tetris.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: dashboard-frontend
  template:
    metadata:
      labels:
        {{- include "tetris.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: dashboard-frontend
      {{- if .Values.linkerd.injectPods }}
      annotations:
        linkerd.io/inject: enabled
      {{- end }}
    spec:
      serviceAccountName: dashboard-frontend
      containers:
        - name: dashboard-frontend
          image: "{{ .Values.dashboardFrontend.image.repository }}:{{ .Values.dashboardFrontend.image.tag }}"
          imagePullPolicy: {{ .Values.dashboardFrontend.image.pullPolicy }}
          ports:
            - containerPort: 80
          env:
            - name: DASHBOARD_API_TARGET
              value: "http://dashboard-api.{{ .Release.Namespace }}.svc.cluster.local"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tetris.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard-frontend
spec:
  type: LoadBalancer
  ports:
    - port: 8090
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    {{- include "tetris.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard-frontend
{{- end }}
