## tetris Helm chart values
## Customize per cluster by overriding these values with -f or --set flags.

# Player-facing Express proxy — serves game UI (gameplay clusters only)
game:
  enabled: true
  replicaCount: 1
  image:
    repository: game
    tag: local
    pullPolicy: IfNotPresent

# FastAPI backend — scaled to 0 during failover demo (gameplay clusters only)
gameApi:
  enabled: true
  replicaCount: 1
  image:
    repository: game-api
    tag: local
    pullPolicy: IfNotPresent

# Presenter dashboard UI (platform cluster only)
dashboard:
  enabled: false
  replicaCount: 1
  image:
    repository: dashboard
    tag: local
    pullPolicy: IfNotPresent

# Cluster agent — k8s scaling, mode switching, admin controls
# Deployed on gameplay and platform clusters
agent:
  enabled: true
  replicaCount: 1
  image:
    repository: agent
    tag: local
    pullPolicy: IfNotPresent

# Leaderboard API — scoring microservice (scoring cluster only)
leaderboardApi:
  enabled: false
  replicaCount: 1
  image:
    repository: leaderboard-api
    tag: local
    pullPolicy: IfNotPresent

# Cross-cluster leaderboard URL for game-api (set on gameplay clusters)
# e.g. http://leaderboard-api-scoring.tetris.svc.cluster.local
leaderboardApiUrl: ""

# Cluster identity — override per deployment
cluster:
  name: "gameplay-east"
  color: "#3b82f6"
  region: "US East"

# Shared Redis URL — all clusters write to the same instance.
# Override per cluster at deploy time to point to the scoring cluster's Redis.
redis:
  # Deploy a Redis instance on this cluster (scoring cluster only)
  deploy: false
  url: ""

# Public URL shown in the QR code sidebar (game LoadBalancer)
externalUrl: "https://rush.your-domain.com"

# Dashboard public URL — used by the agent to generate the QR code and /go redirect.
# On k3d this defaults to the dashboard LoadBalancer; on cloud set to the real IP/domain.
dashboardUrl: ""

# Admin token — use a Kubernetes secret or override at install time
adminToken: "demo-admin-2024"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# Linkerd sidecar injection
linkerd:
  injectNamespace: true
  injectPods: true

# Service configuration
service:
  type: ClusterIP
  port: 80
  # Multicluster mode — switchable at runtime from the dashboard.
  # Controls the game-api Service label and HTTPRoute backends.
  #
  #   federated — mirror.linkerd.io/federated: member
  #               HTTPRoute routes game-api → game-api-federated.
  #               Linkerd aggregates endpoints from all clusters automatically.
  #
  #   mirrored  — mirror.linkerd.io/remote-discovery: member
  #               HTTPRoute splits traffic equally across local game-api
  #               and all mirrored backends. Pod-to-pod direct communication.
  #
  #   gateway   — mirror.linkerd.io/exported: "true"
  #               HTTPRoute splits traffic equally across local game-api
  #               and all mirrored backends. Traffic flows through gateways.
  mode: federated

ingress:
  enabled: false
  className: ""
  host: ""
  tls:
    enabled: false
    secretName: ""
  annotations: {}
